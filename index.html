<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divisor de Texto Inteligente Crônicas Estelares</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* --- VARIÁVEIS DE TEMA --- */
        :root {
            --bg-color: #050e1a;
            --container-bg: rgba(10, 20, 35, 0.9);
            --container-border: rgba(50, 100, 180, 0.5);
            --container-shadow: rgba(0, 191, 255, 0.3);
            --text-primary: #e6f2ff;
            --text-secondary: #66b3ff;
            --text-tertiary: #99ccff;
            --header-text: #87ceeb;
            --header-shadow: rgba(135, 206, 235, 0.7);
            --header-hover-shadow: rgba(135, 206, 235, 0.9);
            --link-color: #00bfff;
            --link-hover-color: #87ceeb;
            --part-bg: rgba(15, 25, 45, 0.8);
            --part-border: #2c4766;
            --part-header-border: #3a5f88;
            --input-bg: #ffffff;
            --input-text: #000000;
            --input-border: #ced4da;
            --input-focus-border: #007bff;
            --input-focus-shadow: rgba(0, 123, 255, 0.25);
            --counter-bg: #e0f2f7;
            --counter-text: #333333;
            --btn-delete-bg-start: #dc3545;
            --btn-delete-bg-end: #ff6347;
            --btn-delete-hover-bg-start: #c82333;
            --btn-delete-hover-bg-end: #ff4500;
            --btn-main-copy-bg-start: #28a745; 
            --btn-main-copy-bg-end: #32cd32;
            --ai-glow: 0 0 15px rgba(0, 86, 179, 0.6);
            --animation-duration-fast: 0.3s;
            --animation-duration-normal: 0.5s;
            --scrollbar-bg: rgba(10, 15, 30, 0.5);
            --scrollbar-thumb: #2c4766;
            --scrollbar-thumb-hover: #00bfff;
        }
        
        body.light-mode {
            --bg-color: #f4f6f8;
            --container-bg: rgba(255, 255, 255, 0.95);
            --container-border: #d1d9e6;
            --container-shadow: rgba(0, 0, 0, 0.1);
            --text-primary: #333333;
            --text-secondary: #0056b3;
            --text-tertiary: #004085;
            --header-text: #0056b3;
            --header-shadow: rgba(0, 86, 179, 0.4);
            --header-hover-shadow: rgba(0, 86, 179, 0.6);
            --link-color: #007bff;
            --link-hover-color: #0056b3;
            --part-bg: #f8f9fa;
            --part-border: #dee2e6;
            --part-header-border: #e9ecef;
            --input-bg: #ffffff;
            --input-text: #000000;
            --input-border: #ced4da;
            --counter-bg: #e9ecef;
            --counter-text: #333333;
            --scrollbar-bg: #e9ecef;
            --scrollbar-thumb: #adb5bd;
            --scrollbar-thumb-hover: #007bff;
        }

        /* --- INTEGRAÇÃO PORTAL --- */
        body.is-portal {
            background-image: none !important;
            background-color: transparent !important;
        }
        body.is-portal::before { display: none !important; }
        body.is-portal .btn-home { display: none !important; }
        body.is-portal .container { 
            box-shadow: none !important; 
            width: 100% !important; 
            max-width: 1100px !important; 
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-track { background: var(--scrollbar-bg); border-radius: 5px; }
        ::-webkit-scrollbar-thumb { background: var(--scrollbar-thumb); border-radius: 5px; border: 2px solid var(--scrollbar-bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--scrollbar-thumb-hover); }

        body {
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            margin: 0;
            padding: 20px;
            background-color: var(--bg-color);
            background-image: url('https://i.imgur.com/GMiX6Rv.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.3s;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(5, 10, 25, 0.85);
            z-index: -1;
        }
        .container {
            position: relative;
            background-color: var(--container-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 0 30px var(--container-shadow);
            max-width: 100%;
            width: 90%;
            border: 1px solid var(--container-border);
            z-index: 1;
            padding-bottom: 40px;
        }
        
        .floating-btn {
            position: fixed;
            z-index: 9999;
            background: var(--part-bg);
            border: 2px solid var(--link-color);
            color: var(--link-color);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 191, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
            outline: none;
        }
        .btn-home { top: 20px; left: 20px; }
        .floating-btn:hover {
            transform: scale(1.15) translateY(-3px);
            background: var(--link-color);
            color: white;
            box-shadow: 0 8px 20px rgba(0, 191, 255, 0.6);
        }

        .form-group { margin-bottom: 15px; }
        .label-wrapper { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
        label { font-weight: 700; color: var(--text-secondary); font-size: 0.9em; }
        
        input[type="text"], input[type="password"], input[type="number"], textarea, select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 0.9em;
            background-color: var(--input-bg);
            color: var(--input-text);
            line-height: 1.4;
            transition: border-color 0.3s;
        }
        
        #inputText { min-height: 175px; resize: vertical; }

        .desc-field-wrapper { position: relative; margin-bottom: 10px; animation: fadeInUp 0.3s ease; transition: opacity 0.3s; }
        .desc-field-wrapper.disabled { opacity: 0.5; }
        .desc-field-wrapper.disabled textarea { background-color: rgba(0,0,0,0.2); text-decoration: line-through; color: var(--text-tertiary); }
        
        .desc-textarea {
            min-height: 50px;
            border: 1px solid #0056b3;
            background: rgba(0, 86, 179, 0.05);
            color: var(--text-primary);
            padding-right: 95px;
        }
        body.light-mode .desc-textarea { background: #fff; color: #333; }
        
        .field-actions { position: absolute; top: 5px; right: 25px; display: flex; gap: 5px; z-index: 2; }
        .toggle-desc-btn, .remove-desc-btn {
            border: none; border-radius: 4px; width: 24px; height: 24px; cursor: pointer;
            font-size: 0.8em; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        .remove-desc-btn { background: var(--btn-delete-bg-start); color: white; }
        .toggle-desc-btn { background: var(--link-color); color: white; }
        .toggle-desc-btn.inactive { background: #6c757d; }
        
        .add-desc-btn {
            background: rgba(0, 86, 179, 0.2);
            color: var(--text-tertiary);
            border: 1px dashed #0056b3;
            display: block;
            margin-left: auto;
            padding: 6px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8em;
            font-weight: 700;
            margin-top: 5px;
            margin-bottom: 20px;
            transition: background 0.2s;
        }
        .add-desc-btn:hover { background: rgba(0, 86, 179, 0.3); }

        .char-counter-wrapper { display: flex; justify-content: flex-end; gap: 12px; margin-top: 5px; }
        .generic-char-counter, .narration-time-main {
            font-size: 0.8em; padding: 4px 8px; border-radius: 5px; font-weight: bold;
            background-color: var(--counter-bg); color: var(--counter-text); border: 1px solid var(--container-border);
        }
        
        .main-buttons { display: flex; gap: 10px; margin-top: 20px; margin-bottom: 15px; flex-wrap: wrap; }
        .main-buttons button {
            flex: 1; padding: 8px 10px; border: none; border-radius: 8px;
            cursor: pointer; font-weight: 700; font-size: 0.85em; color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s ease;
            display: flex; align-items: center; justify-content: center; gap: 6px;
            min-width: 150px;
        }
        .main-buttons button:hover { transform: translateY(-2px); }
        .split-btn { background: linear-gradient(45deg, #007bff, #00bfff); }
        .clear-main-btn { background: linear-gradient(45deg, #dc3545, #ff6347); }
        .ai-btn { background: linear-gradient(45deg, #003366, #0056b3); }
        .ai-btn:hover { box-shadow: var(--ai-glow); }

        .api-badge {
            background: rgba(255, 255, 255, 0.2); color: #ffffff; border: 1px solid rgba(255, 255, 255, 0.8);
            font-size: 0.65em; padding: 2px 5px; border-radius: 4px; margin-left: 4px; font-weight: bold;
        }

        .main-btn-dropdown { flex: 1; min-width: 150px; position: relative; display: flex; }
        .main-btn-dropdown > button { width: 100%; }

        .settings-panel {
            background: rgba(255,255,255,0.05); padding: 15px; border-radius: 8px;
            border: 1px solid var(--container-border); margin-bottom: 15px; display: flex; flex-direction: column; gap: 15px;
        }
        body.light-mode .settings-panel { background: rgba(0,0,0,0.03); }
        
        .settings-row { display: flex; align-items: center; justify-content: flex-start; flex-wrap: wrap; gap: 25px; }
        .compact-setting { display: flex; align-items: center; gap: 8px; }
        
        .switch-container { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 22px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--link-color); }
        input:checked + .slider:before { transform: translateX(22px); }
        
        .header-actions { display: flex; gap: 8px; }
        #copyMainTextButton { background: linear-gradient(45deg, #28a745, #32cd32); color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.85em; }
        
        .dropdown-export { position: relative; display: inline-block; }
        .export-main-btn {
            background: linear-gradient(45deg, #e74c3c, #f39c12); color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 0.85em;
            height: 100%; display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .dropdown-content {
            display: none; position: absolute; right: 0; top: 100%; margin-top: 5px;
            background-color: var(--container-bg); min-width: 150px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5); z-index: 100;
            border-radius: 6px; overflow: hidden; border: 1px solid var(--container-border);
        }
        body.light-mode .dropdown-content { background-color: #fff; box-shadow: 0 8px 16px rgba(0,0,0,0.1); }
        .dropdown-content a {
            color: var(--text-primary); padding: 10px 15px; text-decoration: none;
            display: flex; align-items: center; gap: 8px; font-size: 0.9em;
        }
        body.light-mode .dropdown-content a { color: #333; font-weight: bold; }
        .dropdown-content a:hover { background-color: rgba(135, 206, 235, 0.2); color: var(--link-hover-color); }
        .dropdown-content.show { display: block; }

        .part-container { background-color: var(--part-bg); border: 1px solid var(--part-border); padding: 15px; margin-top: 15px; border-radius: 8px; animation: fadeInUp 0.5s ease; }
        .part-header { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .part-textarea { width: 100%; min-height: 120px; border-radius: 4px; padding: 10px; line-height: 1.4; font-size: 0.85em; resize: vertical; }
        .copied-textarea { background-color: rgba(0, 191, 255, 0.15) !important; border: 1px solid #00bfff !important; box-shadow: 0 0 10px rgba(0, 191, 255, 0.3) !important; }
        
        .part-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 8px; flex-wrap: wrap; }
        .copy-btn { background: linear-gradient(45deg, #28a745, #32cd32); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9em; transition: all 0.3s; }
        .copy-btn.copied-active { background: linear-gradient(45deg, #007bff, #00bfff); }

        .audio-player { 
            flex: 1; height: 36px; border-radius: 6px; outline: none;
            background-color: rgba(10, 15, 30, 0.8); color-scheme: dark;
            border: 1px solid var(--part-border); box-shadow: inset 0 0 8px rgba(0,0,0,0.5);
        }
        body.light-mode .audio-player { color-scheme: light; background-color: #f0f0f5; }

        .play-btn { background: linear-gradient(45deg, #002a5c, #0069d9); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9em; min-width: 100px; display: flex; align-items: center; justify-content: center; gap: 5px; width: 100%; transition: all 0.2s; }
        .play-btn:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0, 105, 217, 0.4); }
        .download-audio-btn { background: linear-gradient(45deg, #e67e22, #d35400); color: white; border: none; padding: 0 12px; border-radius: 4px; cursor: pointer; height: 36px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        
        .clear-part-btn { background: linear-gradient(45deg, #dc3545, #ff6347); color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.9em; }
        
        #message { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 10px 20px; border-radius: 8px; z-index: 1000; display: none; color: white; font-weight: bold; font-size: 0.9em; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .success { background: #28a745; }
        .error { background: #dc3545; }
        
        .ai-output-box { background: rgba(0, 86, 179, 0.1); border: 1px solid rgba(0, 86, 179, 0.4); border-radius: 8px; padding: 15px; margin-top: 15px; display: none; animation: fadeInUp 0.5s ease; }
        .ai-output-content { 
            font-size: 0.85em; color: #e6f2ff; white-space: pre-wrap; line-height: 1.6; width: 100%; min-height: 250px; 
            background: rgba(0, 0, 0, 0.2); border: 1px solid rgba(0, 86, 179, 0.3); border-radius: 6px; 
            padding: 12px; box-sizing: border-box; resize: vertical; outline: none; margin-top: 10px;
        }
        body.light-mode .ai-output-content { color: #000; background: #f8f9fa; border-color: #ced4da; }

        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0, 0, 0, 0.7); display: none; justify-content: center; align-items: center; z-index: 2000; opacity: 0; transition: opacity 0.3s ease; }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: var(--container-bg); border: 1px solid var(--container-border); padding: 25px; border-radius: 12px; box-shadow: 0 0 30px rgba(0,0,0,0.8); text-align: center; max-width: 400px; width: 90%; animation: fadeInUp 0.3s ease; }
        body.light-mode .modal-content { background: #fff; border-color: #ccc; }
    </style>
</head>
<body>
    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="confirmMessage" style="color:var(--text-primary)">Tens a certeza?</h3>
            <div style="display: flex; justify-content: center; gap: 15px;">
                <button id="confirmYes" style="padding:10px 20px; background:linear-gradient(45deg, #dc3545, #ff6347); color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold">Sim</button>
                <button id="confirmNo" style="padding:10px 20px; background:#6c757d; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="message"></div>
    <a href="https://cronicasestelares.vercel.app/" class="floating-btn btn-home" title="Início">
        <i class="fas fa-home"></i>
    </a>

    <div class="container">
        <div class="form-group">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                <label for="apiKeyInput" style="font-size:0.9em; color:var(--header-text);"><i class="fas fa-key"></i> Chave API Gemini (IA):</label>
                <a href="https://aistudio.google.com/app/apikey" target="_blank" style="font-size:0.8em; color:var(--link-color); font-weight:bold; text-decoration:none">Obter Chave Grátis</a>
            </div>
            <input type="password" id="apiKeyInput" placeholder="Cola a tua API Key aqui...">
        </div>
        
        <div class="form-group">
            <label>Instruções Opcionais:</label>
            <div id="descContainer"></div>
            <button id="addDescBtn" class="add-desc-btn"><i class="fas fa-plus"></i> Adicionar Instrução</button>
        </div>

        <div class="form-group">
            <div class="label-wrapper">
                <label for="inputText">Roteiro Principal:</label>
                <div class="header-actions">
                    <div class="dropdown-export">
                        <button class="export-main-btn" id="exportMainBtn">Baixar <i class="fas fa-caret-down"></i></button>
                        <div class="dropdown-content">
                            <a href="#" id="downloadPdfOpt"><i class="fas fa-file-pdf"></i> PDF</a>
                            <a href="#" id="downloadTxtOpt"><i class="fas fa-file-alt"></i> TXT</a>
                        </div>
                    </div>
                    <button id="copyMainTextButton"><i class="fas fa-paste"></i> Copiar Tudo</button>
                </div>
            </div>
            <textarea id="inputText" placeholder="Insere o teu roteiro aqui..."></textarea>
            <div class="char-counter-wrapper">
                <span class="narration-time-main"><i class="fas fa-clock"></i> <span id="mainNarrationTimeText">0 seg</span></span>
                <span class="generic-char-counter">Caracteres: <span id="currentTextLength">0</span></span>
            </div>
        </div>

        <div class="settings-panel">
            <div class="settings-row">
                <div class="compact-setting">
                    <label for="voiceSelect">Voz:</label>
                    <select id="voiceSelect">
                        <option value="Kore">Kore (Feminina)</option>
                        <option value="Charon">Charon (Masculina)</option>
                        <option value="Fenrir">Fenrir (Profunda)</option>
                        <option value="Zephyr">Zephyr (Suave)</option>
                    </select>
                </div>
                <div class="compact-setting">
                    <label for="charLimit">Limite Bloco:</label>
                    <input type="number" id="charLimit" value="2000">
                </div>
                <label class="switch-container">
                    <span style="font-size:0.9em; font-weight:bold; color:var(--text-secondary)">Quebrar linhas?</span>
                    <div class="switch"><input type="checkbox" id="formatToggle" checked><span class="slider"></span></div>
                </label>
            </div>
            <textarea id="standardTagsInput" style="height:60px; margin-top:10px" placeholder="Tags padrão (canal, nicho, etc)..."></textarea>
        </div>

        <div class="main-buttons">
            <button id="splitButton" class="split-btn"><i class="fas fa-scissors"></i> Processar e Dividir</button>
            <div class="main-btn-dropdown">
                <button id="aiRefineMainBtn" class="ai-btn"><i class="fas fa-user-astronaut"></i> ✨ Personagens <span class="api-badge">API</span></button>
            </div>
            <button id="aiMetadataBtn" class="ai-btn"><i class="fas fa-rocket"></i> ✨ Metadados SEO <span class="api-badge">API</span></button>
            <button id="clearMainTextButton" class="clear-main-btn"><i class="fas fa-trash"></i> Limpar Tudo</button>
        </div>

        <div id="aiOutput" class="ai-output-box">
            <textarea id="aiOutputContent" class="ai-output-content" spellcheck="false"></textarea>
            <div style="display:flex; gap:10px; margin-top:10px">
                <button id="copyAiOutput" class="copy-btn" style="flex:1">Copiar Resultado</button>
                <button onclick="document.getElementById('aiOutput').style.display='none'" class="clear-part-btn">Fechar</button>
            </div>
        </div>

        <div id="output"></div>
    </div>

    <script>
        const isInsidePortal = window.self !== window.top;
        if (isInsidePortal) document.body.classList.add('is-portal');

        const inputTextElem = document.getElementById('inputText');
        const outputDiv = document.getElementById('output');
        const splitButton = document.getElementById('splitButton');
        const voiceSelect = document.getElementById('voiceSelect');
        const descContainer = document.getElementById('descContainer');
        const apiKeyInput = document.getElementById('apiKeyInput');
        const aiOutput = document.getElementById('aiOutput');
        const aiOutputContent = document.getElementById('aiOutputContent');

        function showMsg(m, t) {
            const msg = document.getElementById('message');
            msg.textContent = m; msg.className = t; msg.style.display = 'block';
            setTimeout(() => msg.style.display = 'none', 3000);
        }

        function formatTime(len) {
            const sec = Math.round((len / 1000) * 60);
            return sec < 60 ? `${sec} seg` : `${Math.floor(sec/60)} min`;
        }

        function copyToClipboard(text) {
            const temp = document.createElement('textarea');
            temp.value = text; document.body.appendChild(temp);
            temp.select(); document.execCommand('copy');
            document.body.removeChild(temp);
            showMsg("Copiado para a área de transferência!", "success");
            return true;
        }

        async function createGeminiPlayer(text, wrapper, voice, idx) {
            const btn = wrapper.querySelector('.play-btn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> A carregar...';
            btn.disabled = true;

            try {
                const apiKey = ""; // Proxy handles this in Canvas
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: `Age como um narrador profissional e narra o seguinte texto: ${text}` }] }],
                    generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: voice } } } },
                    model: "gemini-2.5-flash-preview-tts"
                };

                const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                const data = await response.json();
                const base64Audio = data.candidates?.[0]?.content?.parts?.[0]?.inlineData?.data;

                if (!base64Audio) throw new Error("Audio Error");

                const binaryString = window.atob(base64Audio);
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
                
                const audioBlob = new Blob([bytes.buffer], { type: 'audio/wav' });
                const audioUrl = URL.createObjectURL(audioBlob);
                
                wrapper.innerHTML = `<audio controls class="audio-player" autoplay><source src="${audioUrl}"></audio>
                                    <button onclick="const a=document.createElement('a');a.href='${audioUrl}';a.download='parte_${idx}.wav';a.click();" class="download-audio-btn"><i class="fas fa-download"></i></button>`;
            } catch (e) {
                console.error(e);
                showMsg("Erro ao gerar áudio.", "error");
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        function createPart(txt, idx) {
            const div = document.createElement('div');
            div.className = 'part-container';
            div.innerHTML = `
                <div class="part-header">
                    <h3>Parte ${idx}</h3>
                    <span class="part-stats">${txt.length} carac. | ${formatTime(txt.length)}</span>
                </div>
                <textarea class="part-textarea"></textarea>
                <div class="part-actions">
                    <div class="audio-wrapper">
                        <button class="play-btn">Gerar Áudio</button>
                    </div>
                    <button class="copy-btn"><i class="fas fa-copy"></i> Copiar</button>
                    <button onclick="this.closest('.part-container').remove()" class="clear-part-btn"><i class="fas fa-trash"></i></button>
                </div>`;
            
            const ta = div.querySelector('textarea');
            ta.value = txt;
            
            const play = div.querySelector('.play-btn');
            play.onclick = () => createGeminiPlayer(ta.value, div.querySelector('.audio-wrapper'), voiceSelect.value, idx);
            
            div.querySelector('.copy-btn').onclick = (e) => {
                if(copyToClipboard(ta.value)) {
                    e.currentTarget.classList.add('copied-active');
                    ta.classList.add('copied-textarea');
                }
            };
            
            outputDiv.appendChild(div);
        }

        splitButton.onclick = () => {
            let text = inputTextElem.value.trim();
            if (!text) return showMsg("Insere um texto!", "error");
            
            outputDiv.innerHTML = '';
            const limit = parseInt(document.getElementById('charLimit').value);
            
            if (document.getElementById('formatToggle').checked) {
                text = text.replace(/\n+/g, ' ').replace(/([.?!]+)\s*/g, "$1\n").trim();
            }

            const prefixArr = Array.from(descContainer.querySelectorAll('textarea')).map(t => t.value.trim()).filter(v => v);
            const prefix = prefixArr.length ? prefixArr.join('\n\n') + '\n\n' : '';

            let currentPart = "";
            let partIdx = 1;
            const lines = text.split('\n');

            lines.forEach(line => {
                if ((prefix.length + currentPart.length + line.length) > limit && currentPart) {
                    createPart(prefix + currentPart.trim(), partIdx++);
                    currentPart = "";
                }
                currentPart += line + "\n";
            });

            if (currentPart.trim()) createPart(prefix + currentPart.trim(), partIdx);
            showMsg("Processado com sucesso!", "success");
        };

        document.getElementById('addDescBtn').onclick = () => {
            const wrapper = document.createElement('div');
            wrapper.className = 'desc-field-wrapper';
            wrapper.innerHTML = `<textarea class="desc-textarea" placeholder="Instrução de voz ou contexto..."></textarea>
                                <div class="field-actions">
                                    <button onclick="this.closest('.desc-field-wrapper').classList.toggle('disabled')" class="toggle-desc-btn"><i class="fas fa-eye"></i></button>
                                    <button onclick="this.closest('.desc-field-wrapper').remove()" class="remove-desc-btn"><i class="fas fa-times"></i></button>
                                </div>`;
            descContainer.appendChild(wrapper);
        };

        document.getElementById('copyMainTextButton').onclick = () => copyToClipboard(inputTextElem.value);
        document.getElementById('clearMainTextButton').onclick = () => {
            if(confirm("Desejas limpar tudo?")) {
                inputTextElem.value = "";
                outputDiv.innerHTML = "";
            }
        };

        // UI Interactions
        document.getElementById('exportMainBtn').onclick = (e) => {
            e.stopPropagation();
            document.querySelector('.dropdown-content').classList.toggle('show');
        };
        window.onclick = () => document.querySelector('.dropdown-content').classList.remove('show');
    </script>
</body>
</html>
